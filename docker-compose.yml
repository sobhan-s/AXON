services:
  postgres:
    image: postgres:15-alpine

    container_name: dam-postgres

    restart: always

    env_file:
      - .env

    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - '5432:5432'

    volumes:
      - dam-postgres-data:/var/lib/postgresql/data

    networks:
      - dam-network

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:7

    container_name: dam-mongo

    restart: always

    env_file:
      - .env

    environment:
      - MONGO_INITDB_ROOT_USERNAME=${MONGO_USERNAME}
      - MONGO_INITDB_ROOT_PASSWORD=${MONGO_PASSWORD}
      - MONGO_INITDB_DATABASE=${MONGO_DB}

    ports:
      - '27017:27017'

    volumes:
      - dam_mongo_data:/data/db

    networks:
      - dam-network

  rabbitmq:
    image: rabbitmq:3-management

    container_name: rabbitmq

    hostname: rabbitmq

    ports:
      - '5672:5672'
      - '15672:15672'

    env_file:
      - .env

    environment:
      - RABBITMQ_DEFAULT_USER=admin
      - RABBITMQ_DEFAULT_PASS=admin123

    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf:ro

    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

    restart: unless-stopped

    networks:
      - dam-network

  minio:
    image: minio/minio:latest

    container_name: dam_assets-minio

    restart: always

    env_file:
      - .env

    ports:
      - '9000:9000'
      - '9001:9001'

    volumes:
      - minio_data:/data

    command: server /data --console-address ":9001"

    networks:
      - dam-network

  redis:
    image: redis:7-alpine

    container_name: redis

    hostname: redis

    env_file:
      - .env

    healthcheck:
      test: ['CMD-SHELL', 'redis-cli ping | grep PONG']
      interval: 1s
      timeout: 3s
      retries: 5

    command: ['redis-server']

    ports:
      - '6379:6379'
    restart: unless-stopped

    volumes:
      - redis-data:/data

    networks:
      - dam-network

  auth-api:
    build:
      context: .
      dockerfile: Docker/authservice.Dockerfile

    env_file:
      - .env

    restart: always

    ports:
      - '8001:8001'

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - dam-network

  project-api:
    build:
      context: .
      dockerfile: Docker/projectservice.Dockerfile

    env_file:
      - .env

    restart: always

    ports:
      - '8002:8002'

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - dam-network

  task-api:
    build:
      context: .
      dockerfile: Docker/taskService.Dockerfile

    env_file:
      - .env

    restart: always

    ports:
      - '8003:8003'

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - dam-network

  upload-api:
    build:
      context: .
      dockerfile: Docker/uploadservice.Dockerfile

    env_file:
      - .env

    restart: always

    ports:
      - '8004:8004'

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - dam-network

  assets-api:
    build:
      context: .
      dockerfile: Docker/assetservice.Dockerfile

    env_file:
      - .env

    restart: always

    ports:
      - '8005:8005'

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - dam-network

  analytics-api:
    build:
      context: .
      dockerfile: Docker/analyticservice.Dockerfile

    env_file:
      - .env

    restart: always

    ports:
      - '8007:8007'

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - dam-network

  worker-api:
    build:
      context: .
      dockerfile: Docker/worker.Dockerfile

    env_file:
      - .env

    restart: always

    ports:
      - '8006:8006'

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - dam-network

  gateway-api:
    container_name: gateway-api

    build:
      context: .
      dockerfile: Docker/gateway.Dockerfile

    env_file:
      - .env

    restart: always

    depends_on:
      - auth-api

    ports:
      - '8000:8000'

    networks:
      - dam-network

  web:
    build:
      context: .
      dockerfile: Docker/web.Dockerfile
    container_name: dam-web
    ports:
      - '80:80'
    depends_on:
      - gateway-api
    networks:
      - dam-network
    restart: always

volumes:
  dam-postgres-data:
    external: true
  dam_mongo_data:
    external: true
  minio_data:
    external: true
  web-build:
  rabbitmq_data:
  redis-data:
    driver: local

networks:
  dam-network:
    external: true
